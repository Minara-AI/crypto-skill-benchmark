    path: skills/defi/jupiter-swap
    category: defi

  - name: uniswap-official-swap-planner
    path: skills/defi/uniswap-official-swap-planner
    category: defi
    official: true
    github_repo: Uniswap/uniswap-ai
    github_path: packages/plugins/uniswap-trading/skills/swap-integration

  - name: cow-swap-mev-protection
