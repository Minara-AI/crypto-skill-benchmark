# Skill Registry — defines which skills to pull for benchmarking
#
# Two source types:
#   1. Default: from cryptoskill.org aggregator (repo + path)
#   2. Direct: from the project's own GitHub repo (github_repo + github_path)
#
# Direct sources take priority — they pull from the official upstream repo.
# Skills without github_repo fall back to the cryptoskill.org aggregator.
#
# official: true  → maintained by the project team, pulled by default
# official: false → community-contributed, pulled only with --all

repo: jiayaoqijia/cryptoskill
branch: main

skills:
  # ── Exchanges ──────────────────────────────────────────────
  - name: binance-spot-trading
    path: skills/exchanges/binance-spot-trading
    category: exchanges

  - name: okx-dex-swap
    path: skills/exchanges/okx-dex-swap
    category: exchanges

  - name: okx-cex-trade
    path: skills/exchanges/okx-cex-trade
    category: exchanges

  - name: hyperliquid-perps
    path: skills/exchanges/hyperliquid-perps
    category: exchanges

  - name: kraken-official-spot-execution
    path: skills/exchanges/kraken-official-spot-execution
    category: exchanges
    official: true
    github_repo: krakenfx/kraken-cli
    github_path: skills/kraken-spot-execution

  - name: kucoin-official-spot
    path: skills/exchanges/kucoin-official-spot
    category: exchanges
    official: true
    github_repo: Kucoin/kucoin-skills-hub
    github_path: skills/spot

  - name: gate-trading-copilot
    path: skills/exchanges/gate-trading-copilot
