name: Crypto Skill Benchmark

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scenarios/**'
      - 'rubrics/**'
      - 'dimensions.yaml'
      - 'thresholds.yaml'
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

  # E2E only runs on merge to main
  benchmark-e2e:
    name: Benchmark E2E
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      # E2E requires ANTHROPIC_API_KEY and claude CLI
      # Uncomment when ready for real E2E testing:
      # - run: bun run src/cli.ts ./skills/minara --ci --threshold 70
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: echo "E2E benchmark placeholder — uncomment when claude CLI is available in CI"
